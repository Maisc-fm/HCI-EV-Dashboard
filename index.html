<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EV Infotainment</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/app.js"></script>
</head>
<body>

<div class="app">

  <!-- CLOCK OVERLAY -->
  <div id="clock-screen">
    <h1 id="clock-time">00:00</h1>
  </div>

  <!-- TOP BAR (MISSING BEFORE — THIS IS CRITICAL) -->
  <div class="top-bar" id="top-bar">

    <div class="top-left">
      <span id="top-time">00:00</span>
    </div>

    <div class="top-center">
      <span id="speed">0 km/h</span>
    </div>

    <div class="top-right">
      <img id="battery-icon"
           src="assets/icons/Battery charging.svg">
      <span id="battery">78%</span>
    </div>

  </div>

  <!-- Dynamic Content -->
  <div id="content"></div>

  <!-- Bottom Navigation -->
  <div class="bottom-bar">
    <button onclick="loadScreen('dashboard')">
      <img src="assets/icons/Home.svg">
      <span>Home</span>
    </button>

    <button onclick="loadScreen('media')">
      <img src="assets/icons/Song.svg">
      <span>Media</span>
    </button>

    <button onclick="loadScreen('climate')">
      <img src="assets/icons/Temperature.svg">
      <span>Climate</span>
    </button>

    <button onclick="loadScreen('battery')">
      <img src="assets/icons/Battery charging.svg">
      <span>Battery</span>
    </button>

    <button onclick="loadScreen('navigation')">
      <img src="assets/icons/automobiles_car.svg">
      <span>Nav</span>
    </button>
  </div>

</div>

<script src="js/app.js"></script>
</body>
