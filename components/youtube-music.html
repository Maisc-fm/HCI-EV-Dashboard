<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube Music</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="youtube-container">

    <!-- LEFT SIDEBAR -->
    <div class="yt-sidebar">

        <div class="yt-logo">
            <span>▶ Music</span>
        </div>

        <a href="#" class="yt-item active">Front Page</a>
        <a href="#" class="yt-item">Explore</a>
        <a href="#" class="yt-item">Media Library</a>
        <a href="#" class="yt-item">Upgrade</a>

        <button class="playlist-btn">
            + Create a new playlist
        </button>

        <div class="playlist-section">
            <p>Music I liked</p>
            <p>Listen later</p>
        </div>

    </div>


    <!-- MAIN CONTENT -->
    <div class="yt-main">

        <!-- SEARCH -->
        <div class="yt-search">
            <input type="text"
                   placeholder="Search for songs, albums, musicians, and podcasts...">
        </div>


        <!-- RECOMMENDED -->
        <section class="music-section">
            <h2>You might like</h2>

            <div class="music-grid">

                <div class="music-card">
                    <img src="assets/album1.png">
                    <p>Memory and Smell</p>
                </div>

                <div class="music-card">
                    <img src="assets/album2.png">
                    <p>General's Command</p>
                </div>

                <div class="music-card">
                    <img src="assets/album3.png">
                    <p>So are you asleep?</p>
                </div>

                <div class="music-card">
                    <img src="assets/album4.png">
                    <p>Signal</p>
                </div>

                <div class="music-card">
                    <img src="assets/album5.png">
                    <p>Sunny</p>
                </div>

            </div>
        </section>


        <!-- RECAP -->
        <section class="music-section">
            <h2>Recap</h2>

            <div class="music-grid">

                <div class="music-card large">
                    <img src="assets/recap1.png">
                    <p>Recap from December</p>
                </div>

                <div class="music-card large">
                    <img src="assets/recap2.png">
                    <p>2025 Recap</p>
                </div>

            </div>
        </section>

    </div>

</div>

</body>
</html>
