<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="media-container">

    <!-- LEFT PANEL -->
    <div class="media-sidebar">
        <button class="media-btn">
            Bluetooth
        </button>

        <button class="media-btn">
            USB
        </button>

        <button class="media-btn">
            Radio
        </button>

        <!-- LINK TO YOUTUBE MUSIC -->
        <a href="youtube-music.html" class="media-btn active">
            Youtube Music
        </a>

        <button class="media-btn">
            Spotify
        </button>
    </div>


    <!-- CENTER PLAYER -->
    <div class="media-player">

        <div class="album-art">
            <img src="assets/unimas.png" alt="Album">
        </div>

        <h2>UNIMAS Gemilang</h2>

        <div class="progress-section">
            <span>0:10</span>

            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>

            <span>3:15</span>
        </div>

        <div class="controls">
            <button>⟲</button>
            <button>⏮</button>
            <button class="play-btn">▶</button>
            <button>⏭</button>
            <button>🔀</button>
        </div>

    </div>


    <!-- RIGHT PANEL -->
    <div class="up-next">

        <h3>Up Next</h3>

        <div class="song-card">
            <img src="assets/unimas.png">
            <span>UNIMAS Gemilang</span>
        </div>

        <div class="song-card">
            <img src="assets/unimas.png">
            <span>UNIMAS Gemilang</span>
        </div>

        <div class="song-card">
            <img src="assets/unimas.png">
            <span>UNIMAS Gemilang</span>
        </div>

        <div class="song-card">
            <img src="assets/unimas.png">
            <span>UNIMAS Gemilang</span>
        </div>

    </div>

</div>

</body>
</html>
