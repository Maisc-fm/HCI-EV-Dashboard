<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Climate Control</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="climate-container">

    <!-- HEADER -->
    <div class="climate-header">
        <h1>Climate Control</h1>
        <a href="index.html" class="back-btn">← Back</a>
    </div>


    <!-- TEMPERATURE PANEL -->
    <div class="temp-panel">

        <h3>Cabin Temperature</h3>
        <h2>22°C</h2>

        <div class="temp-control">
            <span class="minus">−</span>

            <input type="range"
                   min="16"
                   max="30"
                   value="22">

            <span class="plus">+</span>
        </div>

        <div class="temp-range">
            <span>16°C</span>
            <span>30°C</span>
        </div>


        <!-- MODE CARDS -->
        <div class="mode-row">

            <div class="mode-card active">
                <h4>AUTO MODE</h4>
                <p>On</p>
            </div>

            <div class="mode-card active">
                <h4>A/C</h4>
                <p>On</p>
            </div>

        </div>

    </div>


    <!-- FAN SPEED -->
    <div class="fan-panel">

        <h3>Fan Speed</h3>

        <div class="fan-levels">
            <div class="fan-box active"></div>
            <div class="fan-box"></div>
            <div class="fan-box"></div>
            <div class="fan-box"></div>
            <div class="fan-box"></div>
        </div>

        <div class="fan-labels">
            <span>Low</span>
            <span>High</span>
        </div>

    </div>


    <!-- DEFOG -->
    <div class="defog-panel">

        <div class="defog-left">
            <h4>Defog/Defrost</h4>
            <p>Inactive</p>
        </div>

        <button>Front Vents</button>
        <button>Rear Vents</button>
        <button>Recirculate Air</button>

        <div class="off-btn">OFF</div>

    </div>

</div>

</body>
</html>
